
# Data pipeline for local audio files loaded from a JSONL manifest.
# Audio at any sample rate is automatically resampled to 24kHz.

dataloader:
  _target_: torch.utils.data.DataLoader
  dataset: ${..datalist}
  batch_size: null
  num_workers: 0

gluster_opener:
  _target_: dualcodec.dataset.processor.gluster_opener
  _partial_: true
  manual_dist_sampler: false  # single-GPU; set true for multi-GPU

gluster_filter:
  _target_: dualcodec.dataset.processor.gluster_filter
  _partial_: true
  is_emilia: false
  load_from_tar: false
  max_length: 2000
  min_length: 150
  token_max_length: 300
  ignore_text: true

resample:
  _target_: dualcodec.dataset.processor.resample
  _partial_: true
  resample_rate: ${trainer.sample_rate}

batch:
  _target_: dualcodec.dataset.processor.batch
  _partial_: true
  batch_type: static
  batch_size: ${trainer.batch_size}
  ignore_text: true
  max_frames_in_batch: null

gluster_padding:
  _target_: dualcodec.dataset.processor.gluster_padding
  _partial_: true
  use_spk_embedding: false
  return_speech: true
  ignore_text: true

# Wav2Vec2-BERT feature extraction (semantic branch input)
w2v_feat_extractor:
  _target_: transformers.SeamlessM4TFeatureExtractor.from_pretrained
  _partial_: false
  pretrained_model_name_or_path: ${machine.w2v_path}
w2v_feature:
  _target_: dualcodec.dataset.processor.w2v_feature
  _partial_: true
  feature_extractor: ${..w2v_feat_extractor}

dataset:
  _target_: dualcodec.dataset.train_dataset.ManifestAudioDataset
  manifest_path: ${machine.manifest_path}
  data_root: ${machine.data_root}
  min_duration: 1.0
  max_duration: 45.0
  shuffle: true

datalist_tmp:
  _target_: dualcodec.dataset.dataset.DataList
  lists: ${..dataset}
  shuffle: false
  partition: false

datalist:
  _target_: dualcodec.dataset.dataset.prepare_gluster_dataset
  data_list: ${..datalist_tmp}
  data_pipeline: ${..data_pipeline}

segment_speech:
  _target_: dualcodec.dataset.processor.segment_speech
  _partial_: true
  segment_length: 76800  # 3.2s at 24kHz

data_pipeline:
  - ${..gluster_opener}
  - ${..gluster_filter}
  - ${..resample}
  - ${..segment_speech}
  - ${..w2v_feature}
  - ${..batch}
  - ${..gluster_padding}
