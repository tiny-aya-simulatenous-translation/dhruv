defaults:
  - data: hf_audio_static_batch
  - machine: turkish_local
  - model: dualcodec_25hz_16384_1024_12vq
  - trainer: codec_model_trainer
  - _self_
hydra:
  run:
    dir: ${machine.log_dir}/${trainer.exp_name}

trainer:
  exp_name: dualcodec_ft_turkish_25hz
  max_tokens: 2000
  batch_size: 12
  args:
    resume: true
    reset_steps: true
    resume_type: finetune
    resume_from_ckpt_path: ${machine.init_model_path}
    model_1_name: dualcodec_25hz_16384_1024.safetensors
    model_2_name: discriminator_dualcodec_25hz_16384_1024.safetensors

  cfg:
    semantic_vq: true
    lambda_semantic_commitment_loss: 0.25
    lambda_semantic_codebook_loss: 1.0
    lambda_distill_loss: 15.0
    add_semantic_spec_loss: true
    train:
      max_steps: 35000
      save_checkpoint_stride:
        - 5000
      keep_last: [4]
      disable_mixed_precision: true
      optimizer:
        lr: 1e-4
      adamw:
        lr: 1e-4
      scheduler:
        warmup_steps: 1000
        total_steps: 35000
        min_lr: 2e-5

data:
  dataset:
    max_hours: 100
